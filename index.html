<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Assistant Formation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .chat-container {
    width: 100%;
    max-width: 720px;
    height: 92vh;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header .avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header h2 { font-size: 1rem; font-weight: 600; }
  .chat-header p  { font-size: 0.78rem; opacity: 0.85; }
  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #4ade80;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; } }

  .message.bot  { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .bot  .bubble { background: #f1f0fe; color: #1e1b4b; border-bottom-left-radius: 4px; }
  .user .bubble { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border-bottom-right-radius: 4px; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .bot  .msg-avatar { background: #ede9fe; }
  .user .msg-avatar { background: #6366f1; }

  /* Typing indicator */
  .typing .bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 18px;
  }
  .dot {
    width: 7px; height: 7px;
    background: #a5b4fc;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%         { transform: translateY(-6px); }
  }

  /* Input */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid #e5e7eb;
    background: #fff;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #d1d5db;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 0.9rem;
    resize: none;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    line-height: 1.4;
  }
  textarea:focus { border-color: #6366f1; }

  button#send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  button#send-btn:hover   { transform: scale(1.07); }
  button#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Suggestions */
  .suggestions {
    padding: 0 20px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .suggestion-chip {
    background: #f1f0fe;
    color: #6366f1;
    border: 1px solid #c4b5fd;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .suggestion-chip:hover { background: #ede9fe; }

  /* Scrollbar */
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
</style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div>
      <h2>Assistant Formation</h2>
      <p>Posez vos questions sur le cours</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">Bonjour ! 👋 Je suis votre assistant pédagogique. Je connais vos documents de formation et suis là pour répondre à vos questions. Comment puis-je vous aider ?</div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <span class="suggestion-chip" onclick="useChip(this)">📋 Résumé du cours</span>
    <span class="suggestion-chip" onclick="useChip(this)">❓ Points clés à retenir</span>
    <span class="suggestion-chip" onclick="useChip(this)">📝 Exercices disponibles</span>
  </div>

  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Écrivez votre question…"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Envoyer">➤</button>
  </div>
</div>

<script>
  const API_URL = "http://localhost:5000/chat";
  let history = [];

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Enter pour envoyer (Shift+Enter = nouvelle ligne)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function useChip(el) {
    inputEl.value = el.textContent.replace(/^[^\s]+\s/, "");
    sendMessage();
  }

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;
    const icon = role === "bot" ? "🤖" : "🧑";
    wrap.innerHTML = `
      <div class="msg-avatar">${icon}</div>
      <div class="bubble">${text}</div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message bot typing";
    wrap.id = "typing";
    wrap.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Hide suggestions after first message
    document.getElementById("suggestions").style.display = "none";

    addMessage("user", text);
    history.push({ role: "user", content: text });

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();
      hideTyping();

      const answer = data.answer || "❌ Erreur de réponse.";
      addMessage("bot", answer);
      history.push({ role: "assistant", content: answer });

    } catch (err) {
      hideTyping();
      addMessage("bot", "⚠️ Impossible de contacter le serveur. Vérifiez que `app.py` est bien lancé.");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
